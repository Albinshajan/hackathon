<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hackathon AI Foundation</title>
    <style>
        body { font-family: system-ui, sans-serif; max-width: 600px; margin: 2rem auto; padding: 1rem; }
        textarea { width: 100%; height: 100px; margin-bottom: 1rem; padding: 0.5rem; }
        button { padding: 0.5rem 1rem; background: #0070f3; color: white; border: none; cursor: pointer; }
        button:disabled { background: #ccc; }
        #output { margin-top: 1.5rem; padding: 1rem; background: #f4f4f4; border-radius: 4px; min-height: 50px;}
    </style>
</head>
<body>

    <h1>AI Generator</h1>
    <p>A minimal scaffold to test your AI logic.</p>

    <textarea id="userInput" placeholder="Enter your prompt here..."></textarea>
    <br>
    <button id="generateBtn" onclick="runAI()">Generate</button>

    <div id="output">Results will appear here...</div>

    <script>
        async function runAI() {
            const inputField = document.getElementById('userInput');
            const outputDiv = document.getElementById('output');
            const btn = document.getElementById('generateBtn');

            const text = inputField.value;
            if (!text) return;

            // UI State: Loading
            btn.disabled = true;
            btn.innerText = "Thinking...";
            outputDiv.innerText = "Calling backend...";

            try {
                // Call your FastAPI backend
                const response = await fetch('https://hackathon-sipz.onrender.com/api/generate', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ user_input: text })
                });

                if (!response.ok) throw new Error("Network response was not ok");
                
                const data = await response.json();
                
                // Display the result
                outputDiv.innerText = data.result;

            } catch (error) {
                console.error("Fetch error:", error);
                outputDiv.innerText = "An error occurred. Check the console.";
            } finally {
                // UI State: Reset
                btn.disabled = false;
                btn.innerText = "Generate";
            }
        }
    </script>
</body>
</html>
